services:
  # El mensajero temporal (se queda en local)
    redis-server:
        image: redis:alpine

    ingest-api:
        build: ./ingest_api
        ports:
            - "8000:8000"
        env_file:
            - .env
        command: python main.py  # <--- ESTO MANTIENE EL PROCESO VIVO
        depends_on:
            - redis-server

    metrics-worker:
        build: ./metrics_worker
        env_file:
            - .env
        command: python worker.py # <--- Y AQUÍ TAMBIÉN
        depends_on:
            - redis-server

    query-api:
        build: ./query_api
        ports:
            - "8001:8001"
        env_file:
            - .env
        command: python main.py # <--- Y AQUÍ TAMBIÉN
    frontend:
        build: ./frontend
        ports:
            - "5173:5173"
        volumes:
            # Sincroniza tu código local con el contenedor en tiempo real
            - ./frontend:/app
            # Evita conflictos de librerías entre Windows y el Linux del contenedor
            - /app/node_modules
        environment:
            # Una variable de entorno para saber dónde golpear a la Query API
            - VITE_API_URL=http://localhost:8001/api/v1
        depends_on:
            - query-api